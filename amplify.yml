version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        # npm 10.8.2 crashes on the current lockfile with "Cannot read properties
        # of null (reading 'resolve')" — a known Arborist bug. Removing the lock
        # before install forces fresh resolution and sidesteps the crash; the
        # downside (non-deterministic deps across builds) is acceptable for now
        # and would normally be resolved by upgrading npm or moving to pnpm.
        - rm -f package-lock.json
        - npm install --legacy-peer-deps
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
        # Write Amplify Console env vars to .env.production so Next.js SSR
        # runtime can read them (process.env.* in route handlers). Without this,
        # standalone-output Lambdas don't see app-level secrets like
        # ANTHROPIC_API_KEY at request time, only at build time.
        - |
          for v in ANTHROPIC_API_KEY RESEND_API_KEY EMAIL_FROM GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_OAUTH_ENABLED NEXT_PUBLIC_APP_URL; do
            if [ -n "${!v}" ]; then echo "${v}=${!v}" >> .env.production; fi
          done
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
