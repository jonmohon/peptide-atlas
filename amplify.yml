version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        # npm 10.8.2 (default for node 20.19) crashes on this dep tree;
        # upgrading to 10.9+ has the lockfile-resolution fix. --legacy-peer-deps
        # avoids strict peer-dep reconciliation across nested @aws-amplify zod ranges.
        - npm install -g npm@10.9.0
        - npm install --legacy-peer-deps
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
        # Write Amplify Console env vars to .env.production so Next.js SSR
        # runtime can read them (process.env.* in route handlers). Without this,
        # standalone-output Lambdas don't see app-level secrets like
        # ANTHROPIC_API_KEY at request time, only at build time.
        - |
          for v in ANTHROPIC_API_KEY RESEND_API_KEY EMAIL_FROM GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_OAUTH_ENABLED NEXT_PUBLIC_APP_URL; do
            if [ -n "${!v}" ]; then echo "${v}=${!v}" >> .env.production; fi
          done
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
